<!doctype html>
<html lang="vi">
	<head>
		<meta charset="utf-8" />
		<title>Trợ lý AI</title>
		<meta name="description" content="Trợ lý AI" />

		<base href="/" />

		<meta name="color-scheme" content="light dark" />
		<meta
			name="viewport"
			content="viewport-fit=cover, width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no" />
		<meta name="format-detection" content="telephone=no" />

		<style>
			body {
				padding: 1rem;
				font-family: Arial, Helvetica, sans-serif;
				font-size: 16px;
				line-height: 1.5;
				background: #fff;
				color: #000;
			}
			pre {
				margin: 0;
			}

			/* Áp dụng cho Light Mode */
			@media (prefers-color-scheme: light) {
				body {
					background-color: white;
					color: black;
				}
			}

			/* Áp dụng cho Dark Mode */
			@media (prefers-color-scheme: dark) {
				body {
					background-color: black;
					color: white;
				}
			}
		</style>
	</head>
	<body>
		<pre id="jsonViewer"></pre>
		<script>
			window.addEventListener('load', function () {
				function getParamUrl(name) {
					return (
						decodeURIComponent(
							(new RegExp('[?|&]' + name + '=' + '([^&;]+?)(&|#|;|$)').exec(
								location.search
							) || ['', ''])[1].replace(/\+/g, '%20')
						) || null
					);
				}

				let url = getParamUrl('file');
				if (url) {
					fetch(url)
						.then((res) => {
							if (!res.ok) {
								throw new Error(`HTTP error! status: ${res.status}`);
							}
							return res.arrayBuffer();
						})
						.then((buffer) => {
							// Decode UTF-8 đúng cách
							let text = '';
							try {
								text = new TextDecoder('utf-8').decode(buffer);
							} catch (e) {
								try {
									text = new TextDecoder('windows-1258').decode(buffer);
								} catch (e2) {
									text = new TextDecoder('latin1').decode(buffer);
								}
							}

							// Parse JSON
							const json = JSON.parse(text);

							// Format và hiển thị JSON với syntax highlighting cơ bản
							const jsonViewer = document.getElementById('jsonViewer');
							jsonViewer.innerText = JSON.stringify(json, null, 2);

							// Thêm style cho JSON viewer
							jsonViewer.style.whiteSpace = 'pre-wrap';
							jsonViewer.style.wordWrap = 'break-word';
							jsonViewer.style.fontFamily =
								'Consolas, "Courier New", monospace';
							jsonViewer.style.fontSize = '14px';
							jsonViewer.style.lineHeight = '1.4';
						})
						.catch((error) => {
							document.getElementById('jsonViewer').innerHTML =
								'<span style="color: red;">Lỗi khi tải hoặc parse JSON: ' +
								error.message +
								'</span>';
						});
				} else {
					document.getElementById('jsonViewer').innerHTML =
						'<span style="color: orange;">Không tìm thấy tham số "file" trong URL</span>';
				}
			});
		</script>
	</body>
</html>
